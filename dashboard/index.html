<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Randevu Sistemi — Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header header-row">
    <div>
      <h1>Randevu Sitesi Oluşturucu</h1>
      <p>Firma bilgilerinizi girin; müşterileriniz online randevu alsın.</p>
    </div>
    <div class="header-actions">
      <span id="user-label" class="user-label"></span>
      <button type="button" id="logout-btn" class="btn btn-secondary">Çıkış</button>
    </div>
  </header>

  <main class="layout">
    <section class="panel form-panel">
      <h2>Firma Bilgileri</h2>
      <form id="site-form">
        <div class="field">
          <label for="companyName">Firma adı *</label>
          <input type="text" id="companyName" name="companyName" required placeholder="Örn: Güzellik Salonu Ayşe">
        </div>

        <div class="field">
          <label for="category">İş kolu / Kategori *</label>
          <select id="category" name="category" required>
            <option value="">Seçiniz...</option>
          </select>
        </div>

        <div class="field">
          <label for="slug">Site adresi</label>
          <div class="slug-row">
            <span class="slug-prefix">/site/</span>
            <input type="text" id="slug" name="slug" placeholder="guzellik-salonu-ayse">
          </div>
          <small>Boş bırakırsanız firma adından otomatik oluşturulur.</small>
        </div>

        <div class="field">
          <label for="tagline">Slogan</label>
          <input type="text" id="tagline" name="tagline" placeholder="Randevunuzu kolayca alın">
        </div>

        <div class="field">
          <label for="about">Hakkında</label>
          <textarea id="about" name="about" rows="3" placeholder="Firmanızı kısaca tanıtın..."></textarea>
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="phone">Telefon *</label>
            <input type="tel" id="phone" name="phone" required placeholder="0555 123 45 67">
          </div>
          <div class="field">
            <label for="email">E-posta *</label>
            <input type="email" id="email" name="email" required placeholder="info@firma.com">
          </div>
        </div>

        <div class="field">
          <label for="address">Adres</label>
          <input type="text" id="address" name="address" placeholder="Mahalle, cadde, il">
        </div>

        <fieldset class="schedule-fieldset">
          <legend>Randevu takvimi ayarları</legend>
          <div class="grid-3">
            <div class="field">
              <label for="workStart">Başlangıç</label>
              <input type="time" id="workStart" name="workStart" value="09:00">
            </div>
            <div class="field">
              <label for="workEnd">Bitiş</label>
              <input type="time" id="workEnd" name="workEnd" value="18:00">
            </div>
            <div class="field">
              <label for="slotDuration">Slot süresi (dk)</label>
              <select id="slotDuration" name="slotDuration">
                <option value="15">15 dk</option>
                <option value="30" selected>30 dk</option>
                <option value="45">45 dk</option>
                <option value="60">60 dk</option>
              </select>
            </div>
          </div>
          <div class="field">
            <span class="label-text">Çalışılan günler</span>
            <div class="day-checks" id="work-days">
              <label><input type="checkbox" value="1" checked> Pzt</label>
              <label><input type="checkbox" value="2" checked> Sal</label>
              <label><input type="checkbox" value="3" checked> Çar</label>
              <label><input type="checkbox" value="4" checked> Per</label>
              <label><input type="checkbox" value="5" checked> Cum</label>
              <label><input type="checkbox" value="6"> Cmt</label>
              <label><input type="checkbox" value="0"> Paz</label>
            </div>
          </div>
          <div class="field">
            <label for="workingHours">Görünen çalışma saatleri (sitede)</label>
            <input type="text" id="workingHours" name="workingHours" value="Pazartesi – Cuma: 09:00 – 18:00">
          </div>
        </fieldset>

        <div class="field">
          <label for="services">Hizmetler</label>
          <input type="text" id="services" name="services" placeholder="Saç kesimi, Manikür (virgülle ayırın)">
        </div>

        <div class="grid-2">
          <div class="field">
            <label for="primaryColor">Ana renk</label>
            <input type="color" id="primaryColor" name="primaryColor" value="#2563eb">
          </div>
          <div class="field">
            <label for="logoUrl">Logo URL (isteğe bağlı)</label>
            <input type="url" id="logoUrl" name="logoUrl" placeholder="https://...">
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn btn-primary">Siteyi kaydet ve oluştur</button>
          <button type="button" id="preview-btn" class="btn btn-secondary">Önizle</button>
        </div>
      </form>
      <p id="message" class="message" hidden></p>
    </section>

    <section class="panel list-panel">
      <h2>Kayıtlı siteler</h2>
      <ul id="sites-list" class="sites-list">
        <li class="empty">Henüz site yok.</li>
      </ul>
      <div id="appointments-panel" class="appointments-panel" hidden>
        <h3 id="appt-panel-title">Randevular</h3>
        <ul id="appointments-list" class="appointments-list"></ul>
      </div>
    </section>
  </main>

  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
